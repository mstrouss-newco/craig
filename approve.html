<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your board · craig</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#EAE7DE;--card:#FBFAF6;--ink:#23211C;--ink-soft:#5C584E;--pine:#2F5D4F;--pine-deep:#244A3F;--ochre:#BC8439;--clay:#A8503C;--line:#D9D3C6;--line-soft:#E7E2D6;--shadow:0 1px 2px rgba(35,33,28,.05),0 8px 24px rgba(35,33,28,.06);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Public Sans',system-ui,sans-serif;font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Spectral',Georgia,serif;font-weight:500;margin:0;line-height:1.15;letter-spacing:-.01em;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;font-size:16px;}
  a{color:var(--pine);}
  .wrap{max-width:640px;margin:0 auto;padding:30px 20px 80px;}
  .top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
  .mark{font-family:'Spectral',serif;font-size:30px;color:var(--ink);letter-spacing:-.02em;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ochre);transform:translateY(-3px);}
  .org{font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:26px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:22px;box-shadow:var(--shadow);margin-bottom:14px;}
  .gate{margin-top:24px;}.gate h1{font-size:30px;margin-bottom:8px;}.gate p{color:var(--ink-soft);margin:0 0 20px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;}
  .field input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  .hint{font-size:12.5px;color:var(--ink-soft);margin-top:9px;}
  .err{color:var(--clay);font-size:13.5px;margin-top:10px;font-weight:600;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:10px;border:1px solid var(--pine);background:var(--pine);color:#fff;font-weight:600;font-size:15px;width:100%;transition:background .12s,transform .05s;}
  .btn:hover{background:var(--pine-deep);}.btn:active{transform:translateY(1px);}
  .btn.decline{background:transparent;border-color:var(--clay);color:var(--clay);}.btn.decline:hover{background:rgba(168,80,60,.08);}
  .btn.abstain{background:transparent;border-color:var(--line);color:var(--ink-soft);}.btn.abstain:hover{background:var(--line-soft);}
  .btn.subtle{background:var(--card);border-color:var(--line);color:var(--ink);}.btn.subtle:hover{background:var(--line-soft);}
  .btn.link{background:none;border:none;color:var(--pine);width:auto;padding:4px;font-size:14px;font-weight:600;}
  .greet{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;}
  .greet .who{font-family:'Spectral',serif;font-size:21px;}.greet .role{font-size:13px;color:var(--ink-soft);}
  .section-label{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--ochre);font-weight:700;margin:24px 4px 12px;}
  .gname{font-size:20px;}.amt{font-family:'Spectral',serif;font-size:23px;}.purpose{color:var(--ink-soft);margin:6px 0 0;}
  .note{background:var(--line-soft);border-radius:11px;padding:12px 14px;font-size:13.5px;color:var(--ink-soft);margin-top:14px;}
  .actions{display:flex;gap:10px;margin-top:18px;}.actions .btn{width:auto;flex:1;}
  .abstain-row{margin-top:10px;text-align:center;}
  .progress{display:flex;align-items:center;gap:10px;margin-top:16px;}
  .bar{flex:1;height:8px;border-radius:6px;background:var(--line-soft);overflow:hidden;}
  .bar>span{display:block;height:100%;background:var(--pine);border-radius:6px;transition:width .3s;}
  .bar.amber>span{background:var(--ochre);}
  .progress .lbl{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;}
  .voted{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft);}
  .stamp{font-weight:700;}.stamp.green{color:var(--pine);}.stamp.clay{color:var(--clay);}.stamp.amber{color:var(--ochre);}
  .done-banner{background:rgba(47,93,79,.1);border:1px solid rgba(47,93,79,.25);border-radius:11px;padding:11px 14px;color:var(--pine);font-weight:600;font-size:14px;margin-top:14px;}
  .empty{text-align:center;color:var(--ink-soft);padding:30px 10px;}.empty .big{font-family:'Spectral',serif;font-size:21px;color:var(--ink);margin-bottom:6px;}
  .meeting-when{font-family:'Spectral',serif;font-size:18px;margin:4px 0 2px;}
  .doc-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px dashed var(--line);}
  .doc-row:last-child{border-bottom:none;}
  .doc-row .dt{font-weight:600;}.doc-row .ds{font-size:12.5px;color:var(--ink-soft);}
  .signed-line{font-family:'Spectral',serif;font-style:italic;font-size:17px;color:var(--pine);}
  .foot{margin-top:26px;text-align:center;}
  #busy{position:fixed;right:16px;bottom:16px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:80;}
  #busy.on{display:block;}
  #toast{position:fixed;left:50%;transform:translateX(-50%);top:14px;background:var(--clay);color:#fff;padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);display:none;z-index:90;max-width:92%;}
  #toast.on{display:block;}
  .fatal{text-align:center;margin-top:50px;}.fatal .big{font-family:'Spectral',serif;font-size:24px;margin-bottom:8px;}
  .fatal .detail{background:var(--line-soft);border-radius:10px;padding:12px;font-size:12px;color:var(--ink-soft);text-align:left;margin:14px 0;font-family:ui-monospace,monospace;word-break:break-word;}
  :focus-visible{outline:2px solid var(--ochre);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="busy">Working...</div>
<div id="toast"></div>

<script>
const SB_URL='https://nhfymtungjcspgxvaexd.supabase.co';
const SB_KEY='sb_publishable_CY4d7M7zl4AjcLGVltF5LQ_SPQRuYNS';
const REST=SB_URL+'/rest/v1/';
const H=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'});
async function sbGet(p){ const r=await fetch(REST+p,{headers:H()}); if(!r.ok) throw new Error('Load failed ('+r.status+'): '+await r.text()); return r.json(); }
async function sbUpsert(t,row,oc){ const r=await fetch(REST+t+'?on_conflict='+oc,{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(row)}); if(!r.ok) throw new Error('Save failed ('+r.status+'): '+await r.text()); return r.json(); }
async function sbUpdate(t,f,patch){ const r=await fetch(REST+t+'?'+f,{method:'PATCH',headers:{...H(),'Prefer':'return=representation'},body:JSON.stringify(patch)}); if(!r.ok) throw new Error('Update failed ('+r.status+'): '+await r.text()); return r.json(); }
async function sbDelete(t,f){ const r=await fetch(REST+t+'?'+f,{method:'DELETE',headers:H()}); if(!r.ok) throw new Error('Delete failed ('+r.status+'): '+await r.text()); }

const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const money=n=>'$'+Number(n||0).toLocaleString('en-US');
const parseLocal=iso=>{ if(!iso)return null; const s=String(iso); if(s.length===10){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);} return new Date(s); };
const fmtDate=iso=>{const d=parseLocal(iso);return d?d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):'';};
const fmtShort=iso=>{const d=parseLocal(iso);return d?d.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';};
const daysUntil=iso=>{const d=parseLocal(iso);const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);};

let db={org:'',members:[],meetings:[],documents:[],updates:[],grants:[],signatures:[]};
let me=null;

async function loadAll(){
  const [settings,members,meetings,attendance,documents,updates,grants,votes,consents,signoffs]=await Promise.all([
    sbGet('settings?select=*'),sbGet('members?select=*&order=created_at.asc'),sbGet('meetings?select=*&order=meeting_date.desc'),
    sbGet('attendance?select=*'),sbGet('documents?select=*&order=doc_date.desc'),sbGet('updates?select=*&order=update_date.desc'),
    sbGet('grants?select=*&order=grant_date.desc'),sbGet('grant_votes?select=*'),sbGet('consents?select=*&order=consent_date.desc'),sbGet('signoffs?select=*')]);
  db.org=(settings[0]&&settings[0].org_name)||'Your board';
  db.members=members.map(m=>({id:m.id,name:m.name,role:m.role,email:m.email,status:m.status,token:m.access_token}));
  db.meetings=meetings.map(mt=>({id:mt.id,title:mt.title,date:mt.meeting_date,time:mt.meeting_time,location:mt.location,agenda:mt.agenda,
    attendance:Object.fromEntries(attendance.filter(a=>a.meeting_id===mt.id).map(a=>[a.member_id,a.status]))}));
  db.documents=documents.map(d=>({id:d.id,title:d.title,type:d.doc_type,date:d.doc_date,link:d.link,note:d.note}));
  db.updates=updates.map(u=>({id:u.id,title:u.title,body:u.body,authorId:u.author_id,date:u.update_date}));
  db.grants=grants.map(g=>({id:g.id,recipient:g.recipient,amount:Number(g.amount),purpose:g.purpose,notes:g.notes,status:g.status,date:g.grant_date,
    votes:Object.fromEntries(votes.filter(v=>v.grant_id===g.id).map(v=>[v.member_id,v.vote]))}));
  db.signatures=consents.map(c=>({id:c.id,title:c.title,type:c.consent_type,body:c.body,date:c.consent_date,requireAll:c.require_all,
    signed:Object.fromEntries(signoffs.filter(s=>s.consent_id===c.id).map(s=>[s.member_id,(s.signed_at||'').slice(0,10)]))}));
}
const activeMembers=()=>db.members.filter(m=>m.status==='active');
const quorum=()=>Math.max(1,Math.floor(activeMembers().length/2)+1);
const tallyYes=g=>Object.values(g.votes||{}).filter(v=>v==='yes').length;

function setBusy(on){document.getElementById('busy').classList.toggle('on',on);}
let tt;function showError(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),7000);console.error(m);}
function showFatal(e){document.getElementById('app').innerHTML=header()+`<div class="fatal"><div class="big">Can't reach the board right now</div><p style="color:var(--ink-soft)">Please try again in a moment.</p><div class="detail">${esc(e.message||String(e))}</div><button class="btn" onclick="boot()">Try again</button></div>`;console.error(e);}
async function act(fn){ try{ setBusy(true); await fn(); await loadAll(); renderQueue(); }catch(e){ showError(e.message||String(e)); }finally{ setBusy(false); } }

function header(){ return `<div class="top"><span class="mark">craig</span><span class="dot"></span></div><div class="org">${esc(db.org)} · board portal</div>`; }

function renderGate(error){
  document.getElementById('app').innerHTML=header()+`<div class="gate">
    <h1>Welcome to the ${esc(db.org)} board.</h1>
    <p>Confirm your email and craig will show everything waiting on you: the next meeting, grants to approve, documents to sign, and the latest updates. No password.</p>
    <div class="card"><div class="field"><label>Your email</label>
      <input id="email" type="email" placeholder="you@example.org" autocomplete="email" onkeydown="if(event.key==='Enter')identify()"></div>
      <div style="margin-top:16px;"><button class="btn" onclick="identify()">Continue</button></div>
      ${error?`<div class="err">${esc(error)}</div>`:''}
      <div class="hint">Just exploring? Try <strong>dana@example.org</strong> from the sample board.</div></div></div>`;
  const e=document.getElementById('email'); if(e) e.focus();
}
function identify(){
  const v=(document.getElementById('email').value||'').trim().toLowerCase();
  if(!v){ renderGate('Please enter your email.'); return; }
  const m=db.members.find(x=>(x.email||'').toLowerCase()===v && x.status==='active');
  if(!m){ renderGate("We don't see that email on the board. Check the address, or ask your chair to add you."); return; }
  me=m; renderQueue();
}
function signOut(){ me=null; renderGate(); }

/* ----- actions ----- */
function rsvp(mid,status){
  const m=db.meetings.find(x=>x.id===mid); const cur=(m.attendance||{})[me.id];
  act(async()=>{ if(cur===status){ await sbDelete('attendance','meeting_id=eq.'+mid+'&member_id=eq.'+me.id); }
    else { await sbUpsert('attendance',{meeting_id:mid,member_id:me.id,status:status,updated_at:new Date().toISOString()},'meeting_id,member_id'); } });
}
function castVote(gid,v){
  const g=db.grants.find(x=>x.id===gid); const cur=(g.votes||{})[me.id];
  act(async()=>{ if(cur===v){ await sbDelete('grant_votes','grant_id=eq.'+gid+'&member_id=eq.'+me.id); }
    else { await sbUpsert('grant_votes',{grant_id:gid,member_id:me.id,vote:v,voted_at:new Date().toISOString()},'grant_id,member_id'); }
    const rows=await sbGet('grant_votes?select=vote&grant_id=eq.'+gid);
    if(g.status==='pending' && rows.filter(r=>r.vote==='yes').length>=quorum()){ await sbUpdate('grants','id=eq.'+gid,{status:'approved'}); } });
}
function signDoc(cid){ act(async()=>{ await sbUpsert('signoffs',{consent_id:cid,member_id:me.id,signed_at:new Date().toISOString()},'consent_id,member_id'); }); }

/* ----- pieces ----- */
function meetingBlock(){
  const up=db.meetings.filter(m=>daysUntil(m.date)>=0).sort((a,b)=>parseLocal(a.date)-parseLocal(b.date));
  const m=up[0]; if(!m) return '';
  const my=(m.attendance||{})[me.id];
  return `<div class="section-label">Next meeting</div>
    <div class="card"><div class="gname">${esc(m.title)}</div>
      <div class="meeting-when">${fmtDate(m.date)} · ${esc(m.time)}</div>
      <div class="hint" style="margin-top:0;">${esc(m.location)}</div>
      ${m.agenda?`<div class="note">${esc(m.agenda)}</div>`:''}
      <div class="actions">
        <button class="btn ${my==='present'?'':'subtle'}" onclick="rsvp('${m.id}','present')">${my==='present'?"You're attending ✓":"I'll attend"}</button>
        <button class="btn ${my==='absent'?'decline':'subtle'}" onclick="rsvp('${m.id}','absent')">${my==='absent'?"Can't make it ✓":"Can't make it"}</button>
      </div></div>`;
}
function grantCard(g){
  const q=quorum(),yes=tallyYes(g),pct=Math.min(100,Math.round(yes/q*100)),mine=(g.votes||{})[me.id],decided=g.status!=='pending';
  if(!mine && !decided){
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
      <div><div class="gname">${esc(g.recipient)}</div><div class="purpose">${esc(g.purpose)}</div></div><div class="amt">${money(g.amount)}</div></div>
      ${g.notes?`<div class="note">${esc(g.notes)}</div>`:''}
      <div class="actions"><button class="btn" onclick="castVote('${g.id}','yes')">Approve</button><button class="btn decline" onclick="castVote('${g.id}','no')">Decline</button></div>
      <div class="abstain-row"><button class="btn abstain" style="width:auto;" onclick="castVote('${g.id}','abstain')">Abstain</button></div></div>`;
  }
  const label=mine==='yes'?'You approved':mine==='no'?'You declined':mine==='abstain'?'You abstained':'';
  const cls=mine==='yes'?'green':mine==='no'?'clay':'amber';
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
    <div><div class="gname">${esc(g.recipient)}</div><div class="purpose">${esc(g.purpose)}</div></div><div class="amt">${money(g.amount)}</div></div>
    ${decided?`<div class="done-banner">${g.status==='approved'?'Approved by the board.':'Declined by the board.'}</div>`:''}
    ${mine?`<div class="voted"><span class="stamp ${cls}">${label}.</span>${!decided?`<button class="btn link" onclick="castVote('${g.id}','${mine}')">Change my vote</button>`:''}</div>`:''}
    <div class="progress"><div class="bar ${yes>=q?'':'amber'}"><span style="width:${pct}%"></span></div><span class="lbl">${yes} of ${q} approved</span></div></div>`;
}
function consentCard(s){
  const need=s.requireAll?activeMembers().length:quorum();
  const have=Object.keys(s.signed||{}).length;
  const mine=(s.signed||{})[me.id];
  return `<div class="card"><div class="gname">${esc(s.title)}</div><div class="purpose">${esc(s.type)}</div>
    <div class="note">${esc(s.body)}</div>
    ${mine?`<div class="voted"><span class="signed-line">${esc(me.name)}</span><span class="hint" style="margin:0;">signed ${fmtShort(mine)}</span></div>`
          :`<div style="margin-top:16px;"><button class="btn" onclick="signDoc('${s.id}')">Sign as ${esc((me.name||'').split(' ')[0])}</button></div>`}
    <div class="progress"><div class="bar ${have>=need?'':'amber'}"><span style="width:${Math.min(100,Math.round(have/need*100))}%"></span></div><span class="lbl">${have} of ${need} signed</span></div></div>`;
}

function renderQueue(){
  me=db.members.find(x=>x.id===me.id)||me;
  const grantsOpen=db.grants.filter(g=>g.status==='pending' && !(g.votes||{})[me.id]);
  const grantsMine=db.grants.filter(g=>g.status!=='pending' || (g.votes||{})[me.id]);
  const toSign=db.signatures.filter(s=>!(s.signed||{})[me.id]);
  const reading=db.documents;
  const updates=[...db.updates].sort((a,b)=>parseLocal(b.date)-parseLocal(a.date)).slice(0,4);

  document.getElementById('app').innerHTML=header()+`
    <div class="greet"><div class="avatar">${initials(me.name)}</div>
      <div><div class="who">${esc(me.name)}</div><div class="role">${esc(me.role)}</div></div>
      <button class="btn link" style="margin-left:auto;" onclick="signOut()">Not you?</button></div>

    ${meetingBlock()}

    <div class="section-label">Grants waiting on your vote</div>
    ${grantsOpen.length?grantsOpen.map(grantCard).join(''):`<div class="card empty"><div class="big">All caught up.</div>No grants need your vote right now.</div>`}

    ${toSign.length?`<div class="section-label">Waiting for your signature</div>${toSign.map(consentCard).join('')}`:''}

    ${reading.length?`<div class="section-label">Documents</div><div class="card">${reading.map(d=>`<div class="doc-row"><div><div class="dt">${esc(d.title)}</div><div class="ds">${esc(d.type)} · ${fmtShort(d.date)}</div></div><a class="btn link" href="${esc(d.link)}" target="_blank" rel="noopener">Open ↗</a></div>`).join('')}</div>`:''}

    ${updates.length?`<div class="section-label">Latest updates</div>${updates.map(u=>`<div class="card"><div style="font-weight:700;margin-bottom:4px;">${esc(u.title)}</div><div style="color:var(--ink-soft);font-size:14.5px;">${esc(u.body)}</div><div class="hint">${fmtShort(u.date)}</div></div>`).join('')}`:''}

    ${grantsMine.length?`<div class="section-label">Grants you've weighed in on</div>${grantsMine.map(grantCard).join('')}`:''}

    <div class="foot"><span class="hint">craig keeps a record of every vote and signature, with the time it happened.</span></div>`;
}

/* ----- boot ----- */
async function boot(){
  try{
    setBusy(true);
    await loadAll();
    const token=new URLSearchParams(location.search).get('t');
    if(token){ const m=db.members.find(x=>x.token===token && x.status==='active'); if(m){ me=m; renderQueue(); return; } }
    if(me){ renderQueue(); } else { renderGate(); }
  }catch(e){ showFatal(e); }
  finally{ setBusy(false); }
}
boot();
</script>
</body>
</html>
